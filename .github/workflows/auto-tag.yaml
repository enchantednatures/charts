name: Auto Tag on Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'charts/**/Chart.yaml'

permissions:
  contents: write

jobs:
  detect-and-tag:
    name: Detect Version Changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed Chart.yaml files
        id: changed
        run: |
          CHANGED=$(git diff HEAD~1 --name-only -- 'charts/*/Chart.yaml' 'charts/*/*/Chart.yaml' | grep 'Chart\.yaml$' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create tags for version bumps
        if: steps.changed.outputs.files != ''
        run: |
          while IFS= read -r chart_yaml; do
            [[ -z "$chart_yaml" ]] && continue
            [[ ! -f "$chart_yaml" ]] && continue

            CHART_NAME=$(grep '^name:' "$chart_yaml" | head -1 | awk '{print $2}')
            NEW_VERSION=$(grep '^version:' "$chart_yaml" | head -1 | awk '{print $2}')

            if [[ -z "$CHART_NAME" || -z "$NEW_VERSION" ]]; then
              echo "Skipping $chart_yaml: could not parse name or version"
              continue
            fi

            # Check if version actually changed
            OLD_VERSION=$(git show HEAD~1:"$chart_yaml" 2>/dev/null | grep '^version:' | head -1 | awk '{print $2}' || true)
            if [[ "$OLD_VERSION" == "$NEW_VERSION" ]]; then
              echo "No version change in $chart_yaml ($NEW_VERSION), skipping"
              continue
            fi

            TAG="${CHART_NAME}-v${NEW_VERSION}"

            # Don't re-tag if it already exists
            if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists, skipping"
              continue
            fi

            echo "Creating tag $TAG for $chart_yaml (was $OLD_VERSION, now $NEW_VERSION)"
            git tag "$TAG"
            git push origin "$TAG"
          done <<< "${{ steps.changed.outputs.files }}"
