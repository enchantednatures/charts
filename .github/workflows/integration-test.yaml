name: Integration Test

on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - 'examples/**'
      - '.github/workflows/integration-test.yaml'
  pull_request:
    paths:
      - 'charts/**'
      - 'examples/**'
      - '.github/workflows/integration-test.yaml'
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  integration:
    name: Kind Cluster Deploy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [minimal, full-stack, postgres-only, kafka-consumer, kafka-broker, dragonfly-cache]
        include:
          - example: minimal
            install_cnpg_crds: false
            install_kafka_crds: false
            install_flagger_crds: false
            install_dragonfly_crds: false
            install_monitoring_crds: false
            install_eventing_crds: false
          - example: full-stack
            install_cnpg_crds: true
            install_kafka_crds: true
            install_flagger_crds: true
            install_dragonfly_crds: true
            install_monitoring_crds: true
            install_eventing_crds: false
          - example: postgres-only
            install_cnpg_crds: true
            install_kafka_crds: false
            install_flagger_crds: false
            install_dragonfly_crds: false
            install_monitoring_crds: true
            install_eventing_crds: false
          - example: kafka-consumer
            install_cnpg_crds: false
            install_kafka_crds: true
            install_flagger_crds: false
            install_dragonfly_crds: false
            install_monitoring_crds: false
            install_eventing_crds: false
          - example: kafka-broker
            install_cnpg_crds: false
            install_kafka_crds: true
            install_flagger_crds: false
            install_dragonfly_crds: false
            install_monitoring_crds: false
            install_eventing_crds: true
          - example: dragonfly-cache
            install_cnpg_crds: false
            install_kafka_crds: false
            install_flagger_crds: false
            install_dragonfly_crds: true
            install_monitoring_crds: false
            install_eventing_crds: false
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: test-cluster

      - name: Install Knative Serving CRDs
        run: |
          for i in 1 2 3; do
            kubectl apply --server-side -f https://github.com/knative/serving/releases/download/knative-v1.17.0/serving-crds.yaml && break
            echo "Attempt $i failed, retrying in 5s..." && sleep 5
          done
          kubectl wait --for=condition=Established crd/services.serving.knative.dev --timeout=60s

      - name: Install CNPG CRDs
        if: matrix.install_cnpg_crds
        run: |
          for url in \
            https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.25/config/crd/bases/postgresql.cnpg.io_clusters.yaml \
            https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.25/config/crd/bases/postgresql.cnpg.io_poolers.yaml \
            https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.25/config/crd/bases/postgresql.cnpg.io_scheduledbackups.yaml \
            https://raw.githubusercontent.com/cloudnative-pg/plugin-barman-cloud/main/config/crd/bases/barmancloud.cnpg.io_objectstores.yaml; do
            for i in 1 2 3; do
              kubectl apply --server-side -f "$url" && break
              echo "Attempt $i failed for $url, retrying in 5s..." && sleep 5
            done
          done

      - name: Install Prometheus Operator CRDs
        if: matrix.install_monitoring_crds
        run: |
          for url in \
            https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/main/example/prometheus-operator-crd/monitoring.coreos.com_podmonitors.yaml \
            https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/main/example/prometheus-operator-crd/monitoring.coreos.com_prometheusrules.yaml; do
            for i in 1 2 3; do
              kubectl apply --server-side -f "$url" && break
              echo "Attempt $i failed for $url, retrying in 5s..." && sleep 5
            done
          done

      - name: Install Flagger CRDs
        if: matrix.install_flagger_crds
        run: |
          for i in 1 2 3; do
            kubectl apply --server-side -f https://raw.githubusercontent.com/fluxcd/flagger/main/artifacts/flagger/crd.yaml && break
            echo "Attempt $i failed, retrying in 5s..." && sleep 5
          done

      - name: Install Kafka CRDs
        if: matrix.install_kafka_crds
        run: |
          for i in 1 2 3; do
            kubectl apply --server-side -f https://raw.githubusercontent.com/knative-extensions/eventing-kafka-broker/knative-v1.17.0/control-plane/config/eventing-kafka-broker/100-source/100-kafka-source.yaml && break
            echo "Attempt $i failed, retrying in 5s..." && sleep 5
          done

      - name: Install Knative Eventing CRDs (Broker, Trigger)
        if: matrix.install_eventing_crds
        run: |
          for i in 1 2 3; do
            kubectl apply --server-side -f https://github.com/knative/eventing/releases/download/knative-v1.17.0/eventing-crds.yaml && break
            echo "Attempt $i failed, retrying in 5s..." && sleep 5
          done
          kubectl wait --for=condition=Established crd/brokers.eventing.knative.dev --timeout=60s
          kubectl wait --for=condition=Established crd/triggers.eventing.knative.dev --timeout=60s

      - name: Install DragonflyDB CRDs
        if: matrix.install_dragonfly_crds
        run: |
          for i in 1 2 3; do
            kubectl apply --server-side -f https://raw.githubusercontent.com/dragonflydb/dragonfly-operator/main/config/crd/bases/dragonflydb.io_dragonflies.yaml && break
            echo "Attempt $i failed, retrying in 5s..." && sleep 5
          done

      - name: Helm dependency update
        run: helm dependency update examples/${{ matrix.example }}

      - name: Helm dry-run install
        run: |
          helm install test-release examples/${{ matrix.example }} \
            --namespace test-ns \
            --create-namespace \
            --dry-run=server \
            --timeout 120s

      - name: Verify rendered resources via kubectl
        run: |
          kubectl create namespace test-ns --dry-run=client -o yaml | kubectl apply -f -
          helm template test-release examples/${{ matrix.example }} \
            --namespace test-ns | \
            kubectl apply --dry-run=server -f - 2>&1 || true

  app-chart:
    name: App Chart Dry-Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: test-cluster

      - name: Install Knative Serving CRDs
        run: |
          for i in 1 2 3; do
            kubectl apply --server-side -f https://github.com/knative/serving/releases/download/knative-v1.17.0/serving-crds.yaml && break
            echo "Attempt $i failed, retrying in 5s..." && sleep 5
          done
          kubectl wait --for=condition=Established crd/services.serving.knative.dev --timeout=60s

      - name: Resolve app chart dependency locally
        run: |
          sed -i 's|repository: oci://ghcr.io/enchantednatures/charts|repository: "file://../../library/ksvc"|' charts/app/ksvc/Chart.yaml
          helm dependency update charts/app/ksvc

      - name: Helm dry-run install app chart
        run: |
          helm install test-app charts/app/ksvc \
            --namespace test-ns \
            --create-namespace \
            --set services.api.image.repository=ghcr.io/test/app \
            --set services.api.image.tag=v1.0.0 \
            --dry-run=server \
            --timeout 120s
