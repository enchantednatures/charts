name: Release Chart

on:
  push:
    branches: [main]
    paths:
      - 'charts/**/Chart.yaml'
    tags:
      - '*-v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io

jobs:
  detect:
    name: Detect Charts to Release
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_library: ${{ steps.build-matrix.outputs.has_library }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build release matrix
        id: build-matrix
        run: |
          CHARTS="[]"
          HAS_LIBRARY="false"

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            CHART_NAME="${TAG%-v*}"
            CHART_VERSION="${TAG##*-v}"

            if [[ -z "$CHART_NAME" || -z "$CHART_VERSION" ]]; then
              echo "::error::Tag '$TAG' does not match pattern '<chart-name>-v<version>'"
              exit 1
            fi

            for candidate in charts/library/*/Chart.yaml charts/app/*/Chart.yaml; do
              [[ -f "$candidate" ]] || continue
              name=$(grep '^name:' "$candidate" | head -1 | awk '{print $2}')
              if [[ "$name" == "$CHART_NAME" ]]; then
                CHART_PATH="$(dirname "$candidate")"
                CHART_TYPE=$(grep '^type:' "$candidate" | awk '{print $2}')
                CHARTS=$(echo "$CHARTS" | jq -c \
                  --arg name "$CHART_NAME" \
                  --arg version "$CHART_VERSION" \
                  --arg path "$CHART_PATH" \
                  --arg type "$CHART_TYPE" \
                  --arg tag "$TAG" \
                  '. + [{"name":$name,"version":$version,"path":$path,"type":$type,"tag":$tag}]')
                [[ "$CHART_TYPE" == "library" ]] && HAS_LIBRARY="true"
                break
              fi
            done

            if [[ "$CHARTS" == "[]" ]]; then
              echo "::error::No chart found with name '$CHART_NAME'"
              exit 1
            fi

          else
            for chart_yaml in $(git diff HEAD~1 --name-only -- 'charts/*/Chart.yaml' 'charts/*/*/Chart.yaml' | grep 'Chart\.yaml$' || true); do
              [[ -f "$chart_yaml" ]] || continue

              CHART_NAME=$(grep '^name:' "$chart_yaml" | head -1 | awk '{print $2}')
              NEW_VERSION=$(grep '^version:' "$chart_yaml" | head -1 | awk '{print $2}')

              [[ -z "$CHART_NAME" || -z "$NEW_VERSION" ]] && continue

              OLD_VERSION=$(git show HEAD~1:"$chart_yaml" 2>/dev/null | grep '^version:' | head -1 | awk '{print $2}' || true)
              [[ "$OLD_VERSION" == "$NEW_VERSION" ]] && continue

              CHART_PATH="$(dirname "$chart_yaml")"
              CHART_TYPE=$(grep '^type:' "$chart_yaml" | awk '{print $2}')
              TAG="${CHART_NAME}-v${NEW_VERSION}"

              CHARTS=$(echo "$CHARTS" | jq -c \
                --arg name "$CHART_NAME" \
                --arg version "$NEW_VERSION" \
                --arg path "$CHART_PATH" \
                --arg type "$CHART_TYPE" \
                --arg tag "$TAG" \
                '. + [{"name":$name,"version":$version,"path":$path,"type":$type,"tag":$tag}]')

              [[ "$CHART_TYPE" == "library" ]] && HAS_LIBRARY="true"
            done
          fi

          if [[ "$CHARTS" == "[]" ]]; then
            echo "No charts to release"
          else
            echo "Charts to release: $CHARTS"
          fi

          echo "matrix={\"include\":$CHARTS}" >> "$GITHUB_OUTPUT"
          echo "has_library=$HAS_LIBRARY" >> "$GITHUB_OUTPUT"

  release:
    name: "Release ${{ matrix.name }} v${{ matrix.version }}"
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.matrix != '' && toJSON(fromJSON(needs.detect.outputs.matrix).include) != '[]'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Update chart version
        run: |
          sed -i "s/^version:.*/version: ${{ matrix.version }}/" \
            ${{ matrix.path }}/Chart.yaml

      - name: Helm lint
        run: |
          CHART_PATH="${{ matrix.path }}"
          CHART_TYPE="${{ matrix.type }}"

          if [[ "$CHART_TYPE" == "application" ]]; then
            helm dependency update "$CHART_PATH"
          fi

          helm lint "$CHART_PATH"

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version v0.8.2

      - name: Run unit tests (library charts)
        if: matrix.type == 'library'
        run: |
          CHART_PATH="${{ matrix.path }}"
          if [[ -d "$CHART_PATH/test-chart" ]]; then
            helm dependency update "$CHART_PATH/test-chart"
            helm unittest "$CHART_PATH/test-chart"
          else
            echo "No test-chart found, skipping unit tests"
          fi

      - name: Login to OCI registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Package chart
        run: |
          helm package ${{ matrix.path }} --destination /tmp/charts

      - name: Push chart to OCI registry
        run: |
          helm push "/tmp/charts/${{ matrix.name }}-${{ matrix.version }}.tgz" \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Create tag
        run: |
          TAG="${{ matrix.tag }}"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag }}
          name: "${{ matrix.name }} v${{ matrix.version }}"
          generate_release_notes: true
          files: |
            /tmp/charts/${{ matrix.name }}-${{ matrix.version }}.tgz

  update-dependents:
    name: Update Dependent Charts
    runs-on: ubuntu-latest
    needs: [detect, release]
    if: needs.detect.outputs.has_library == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Update dependent app charts and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASED='${{ needs.detect.outputs.matrix }}'
          UPDATED_ANY="false"
          BRANCH_NAME="chore/bump-deps-$(date +%s)"
          PR_BODY="Automated dependency bump triggered by library chart release.\n\n**Updated dependencies:**\n"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"

          # For each released library chart, find and update dependent app charts
          for row in $(echo "$RELEASED" | jq -c '.include[] | select(.type == "library")'); do
            LIB_NAME=$(echo "$row" | jq -r '.name')
            LIB_VERSION=$(echo "$row" | jq -r '.version')

            echo "Looking for app charts depending on $LIB_NAME..."

            for app_chart in charts/app/*/Chart.yaml; do
              [[ -f "$app_chart" ]] || continue

              # Check if this app chart depends on the released library
              if ! grep -q "name: $LIB_NAME" "$app_chart"; then
                continue
              fi

              APP_NAME=$(grep '^name:' "$app_chart" | head -1 | awk '{print $2}')
              OLD_APP_VERSION=$(grep '^version:' "$app_chart" | head -1 | awk '{print $2}')

              # Bump app chart patch version
              IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_APP_VERSION"
              NEW_APP_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

              echo "Updating $APP_NAME: version $OLD_APP_VERSION -> $NEW_APP_VERSION, dep $LIB_NAME -> $LIB_VERSION"

              # Update the app chart version
              sed -i "s/^version: ${OLD_APP_VERSION}/version: ${NEW_APP_VERSION}/" "$app_chart"

              # Update the dependency version for this library
              awk -v lib="$LIB_NAME" -v ver="$LIB_VERSION" '
                /^dependencies:/ { in_deps=1 }
                in_deps && /- name:/ { in_dep_entry=1; is_target=0 }
                in_deps && in_dep_entry && $0 ~ "name: " lib { is_target=1 }
                in_deps && in_dep_entry && is_target && /version:/ {
                  sub(/version: .*/, "version: " ver)
                  is_target=0; in_dep_entry=0
                }
                { print }
              ' "$app_chart" > "${app_chart}.tmp" && mv "${app_chart}.tmp" "$app_chart"

              PR_BODY+="- \`$APP_NAME\` $OLD_APP_VERSION → $NEW_APP_VERSION (dep \`$LIB_NAME\` → $LIB_VERSION)\n"
              UPDATED_ANY="true"
            done
          done

          if [[ "$UPDATED_ANY" == "false" ]]; then
            echo "No dependent charts to update"
            exit 0
          fi

          git add charts/app/*/Chart.yaml
          git commit -m "chore: bump dependent chart versions"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "chore: bump dependent chart versions" \
            --body "$(echo -e "$PR_BODY")" \
            --base main \
            --head "$BRANCH_NAME"
