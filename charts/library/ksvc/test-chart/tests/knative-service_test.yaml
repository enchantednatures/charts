suite: knative service tests
templates:
  - templates/common.yaml
set:
  services.api.image.repository: test/image
  services.api.image.tag: "v1.0.0"
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should render a Knative Service
    documentIndex: 0
    asserts:
      - isKind:
          of: Service
      - equal:
          path: apiVersion
          value: serving.knative.dev/v1

  - it: should set the correct name
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: test-release-api

  - it: should set the correct namespace
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.namespace
          value: test-ns

  - it: should set scaling annotations
    set:
      services.api.scaling.minScale: 2
      services.api.scaling.maxScale: 20
      services.api.scaling.target: 50
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.metadata.annotations["autoscaling.knative.dev/min-scale"]
          value: "2"
      - equal:
          path: spec.template.metadata.annotations["autoscaling.knative.dev/max-scale"]
          value: "20"
      - equal:
          path: spec.template.metadata.annotations["autoscaling.knative.dev/target"]
          value: "50"

  - it: should set resource limits
    set:
      services.api.resources.limits.cpu: "2"
      services.api.resources.limits.memory: "1Gi"
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: "2"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: "1Gi"

  - it: should use default port 8080
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  - it: should enforce security context
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: should include flux image policy comment when set
    set:
      services.api.image.fluxImagePolicy: "flux-system:my-service"
    documentIndex: 0
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "test/image:v1.0.0"

  - it: should always mount tmp volume
    documentIndex: 0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}

  - it: should set env vars when provided
    set:
      services.api.env:
        - name: MY_VAR
          value: "hello"
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: MY_VAR

  - it: should render only one document when single service and no features enabled
    asserts:
      - hasDocuments:
          count: 1

  - it: should include component label
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: api

  - it: should render multiple services
    set:
      services.api.image.repository: test/api
      services.worker.image.repository: test/worker
    asserts:
      - hasDocuments:
          count: 2

  - it: should use nameOverride as name suffix when set
    set:
      services.api.nameOverride: web
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: test-release-web

  - it: should produce release name only when nameOverride is empty string
    set:
      services.api.nameOverride: ""
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: test-release

  - it: should keep component label as the map key even with nameOverride
    set:
      services.api.nameOverride: ""
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: api
