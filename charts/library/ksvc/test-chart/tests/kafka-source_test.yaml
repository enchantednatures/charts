suite: kafka source tests
templates:
  - templates/common.yaml
set:
  knativeService.image.repository: test/image
  kafka.enabled: true
  kafka.dlq.enabled: true
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should render KafkaSource when kafka enabled
    documentIndex: 1
    asserts:
      - isKind:
          of: KafkaSource
      - equal:
          path: apiVersion
          value: sources.knative.dev/v1beta1

  - it: should set correct source name
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: test-release-kafka-source

  - it: should reference the knative service as sink
    documentIndex: 1
    asserts:
      - equal:
          path: spec.sink.ref.name
          value: test-release

  - it: should set topic
    set:
      kafka.source.topic: "my-events"
    documentIndex: 1
    asserts:
      - contains:
          path: spec.topics
          content: "my-events"

  - it: should set default consumer group
    documentIndex: 1
    asserts:
      - equal:
          path: spec.consumerGroup
          value: test-release-consumers

  - it: should set custom consumer group
    set:
      kafka.source.consumerGroup: "my-custom-group"
    documentIndex: 1
    asserts:
      - equal:
          path: spec.consumerGroup
          value: my-custom-group

  - it: should render DLQ service when enabled
    documentIndex: 2
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-release-dlq

  - it: should set dead letter sink when DLQ enabled
    documentIndex: 1
    asserts:
      - equal:
          path: spec.delivery.deadLetterSink.ref.name
          value: test-release-dlq

  - it: should not render KafkaSource when kafka disabled
    set:
      kafka.enabled: false
    asserts:
      - hasDocuments:
          count: 1
