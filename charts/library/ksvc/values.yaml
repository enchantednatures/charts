# =============================================================================
# Global Settings
# =============================================================================
global:
  # Override the chart fullname (default: Release.Name)
  nameOverride: ""
  fullnameOverride: ""

  # Labels applied to ALL resources
  labels: {}

  # Annotations applied to ALL resources
  annotations: {}

  # Default cert-manager issuer for all Certificate resources.
  # Individual components (postgres.certManager, dragonfly.tls.certManager) can
  # override this with their own issuerRef.
  certManager:
    issuerRef:
      name: ""
      kind: ClusterIssuer
      group: cert-manager.io

# =============================================================================
# Services — Map of Knative Services (one or more)
#
# Each key becomes a name suffix: <release-name>-<key>
# Use nameOverride to change the suffix (or set to "" for no suffix).
# Example:
#   services:
#     api:
#       image: { repository: ghcr.io/org/api, tag: v1.0.0 }
#     worker:
#       image: { repository: ghcr.io/org/worker, tag: v1.0.0 }
#     app:
#       nameOverride: ""    # produces just <release-name> with no suffix
#       image: { repository: ghcr.io/org/app, tag: v1.0.0 }
# =============================================================================
services:
  api:
    # Container image configuration
    image:
      repository: ""
      tag: "latest"
      pullPolicy: IfNotPresent
      # Flux image policy annotation
      fluxImagePolicy: ""

    # Knative autoscaling
    scaling:
      minScale: 1
      maxScale: 10
      target: 100
      containerConcurrency: 100
      timeoutSeconds: 300
      class: ""

    # Container resources
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

    # Container port
    port: 8080

    # Health probes
    probes:
      liveness:
        path: /health/live
        port: 8080
        initialDelaySeconds: 3
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3
      readiness:
        path: /health/ready
        port: 8080
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 2

    # Environment variables
    env: []

    # Environment variables from ConfigMaps or Secrets
    envFrom: []

    # Security context for the container
    securityContext:
      runAsNonRoot: true
      runAsUser: 10001
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL

    # Additional volume mounts
    volumeMounts: []

    # Additional volumes
    volumes: []

    # Pod-level annotations
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: "/metrics"

    # Service-level annotations
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: "/metrics"

    # Service-level labels
    labels: {}

    # Flagger Canary Release (per-service opt-in)
    flagger:
      enabled: false

      analysis:
        interval: 1m
        threshold: 5
        maxWeight: 50
        stepWeight: 10
        progressDeadlineSeconds: 120

      metrics:
        successRateThreshold: 99
        latencyP99ThresholdMs: 500
        prometheusAddress: http://prometheus.observability.svc.cluster.local:9090

      loadTest:
        enabled: true
        # URL of the k6 webhook service (grafana/flagger-k6-webhook)
        webhookUrl: http://k6-loadtester.flagger-system/launch-test
        vus: 10
        duration: 1m
        p95ThresholdMs: 500
        errorRateThreshold: 0.01
        # Optional: override the entire k6 script
        script: ""

# =============================================================================
# CloudNativePG PostgreSQL
# =============================================================================
postgres:
  enabled: false

  version: "16"
  instances: 3

  parameters:
    ssl: "on"
    ssl_min_protocol_version: "TLSv1.3"
    ssl_max_protocol_version: "TLSv1.3"
    shared_buffers: "2Gi"
    max_connections: "300"
    synchronous_commit: "remote_apply"
    synchronous_standby_names: "ANY 1 (*)"
    archive_timeout: "5min"
    wal_compression: "on"

  sharedPreloadLibraries:
    - pg_stat_statements

  postInitSQL:
    - "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"
    - "ALTER SYSTEM SET log_statement = 'all';"
    - "ALTER SYSTEM SET log_min_duration_statement = '1000';"

  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

  storage:
    size: "200Gi"
    storageClassName: "standard"

  pooler:
    enabled: true
    instances: 3
    type: rw
    poolMode: transaction
    parameters:
      max_client_conn: "300"
      default_pool_size: "25"
      reserve_pool_size: "5"
      reserve_pool_timeout: "5"
      max_db_connections: "100"
      server_lifetime: "3600"
      server_idle_timeout: "600"
      log_connections: "1"
      log_disconnections: "1"
      log_pooler_errors: "1"
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

  backup:
    enabled: true
    schedule: "0 2 * * *"
    target: prefer-standby
    retentionPolicy: "30d"
    objectStore:
      destinationPath: ""
      endpointURL: ""
      s3Credentials:
        secretName: postgres-backup-storage
        accessKeyIdKey: ACCESS_KEY_ID
        secretAccessKeyKey: ACCESS_SECRET_KEY
      data:
        compression: zstd
        jobs: 2
      wal:
        compression: gzip
        maxParallel: 4

  monitoring:
    enabled: true
    alerts:
      replicationLagWarning: 10
      replicationLagCritical: 60
      highConnectionCount: 50

  # cert-manager integration — generates server + client TLS certificates
  # via CNPG's native spec.certificates support.
  # Requires cert-manager CRDs and an Issuer/ClusterIssuer in the cluster.
  certManager:
    enabled: false
    # Override global.certManager.issuerRef for postgres certificates
    issuerRef:
      name: ""
      kind: ""
      group: ""

# =============================================================================
# Kafka Event Sources — Map of KafkaSource entries
#
# Each key becomes a name suffix: <release-name>-<key>-kafka-source
# The "sink" field must reference a key in the services map.
# Example:
#   kafka:
#     sources:
#       events:
#         topic: my-events
#         sink: api
#       commands:
#         topic: my-commands
#         sink: worker
# =============================================================================
kafka:
  sources: {}

# =============================================================================
# DragonflyDB Cache Cluster
# =============================================================================
dragonfly:
  enabled: false

  # Dragonfly container image
  image: docker.dragonflydb.io/dragonflydb/dragonfly
  imageTag: "v1.21.2"

  # Total instances including master
  replicas: 3

  # Extra Dragonfly CLI args (e.g. --cluster_mode=emulated)
  args: []

  # Environment variables
  env: []

  # Container resources
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

  # Authentication — reference a Secret containing the password
  authentication:
    passwordFromSecret:
      name: ""
      key: password
    # Optional mTLS client CA cert
    clientCaCertSecret:
      name: ""
      key: ca.crt

  # TLS — reference a Secret containing tls.crt / tls.key
  tls:
    secretName: ""
    # cert-manager integration — generates a Certificate resource whose
    # secret is automatically wired into tlsSecretRef.
    # When enabled, tls.secretName is ignored (auto-generated name is used).
    certManager:
      enabled: false
      # Override global.certManager.issuerRef for the dragonfly certificate
      issuerRef:
        name: ""
        kind: ""
        group: ""
      duration: "2160h"
      renewBefore: "360h"

  # Snapshot / persistence configuration
  snapshot:
    enabled: false
    cron: "0 */6 * * *"
    enableOnMasterOnly: true
    # S3 backup: set dir to "s3://bucket/path" (mutually exclusive with PVC)
    dir: ""
    # Use an existing PVC instead of creating one
    existingPersistentVolumeClaimName: ""
    # PVC storage (used only when dir and existingPVC are empty)
    storage:
      size: "10Gi"
      storageClassName: ""

  # Kubernetes Service configuration
  serviceSpec:
    type: ClusterIP
    name: ""
    nodePort: 0
    annotations: {}
    labels: {}

  # PodDisruptionBudget (minAvailable and maxUnavailable are mutually exclusive)
  pdb:
    minAvailable: 2
    maxUnavailable: 0

  # Scheduling
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  nodeSelector: {}

  # Security contexts
  podSecurityContext: {}
  containerSecurityContext: {}

  # Service account
  serviceAccountName: ""

  # Priority class
  priorityClassName: ""
